<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px 20px;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        h1 {
            color: #ee4d2d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        textarea {
            height: 180px;
            resize: none;
            font-size: 14px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ee4d2d;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #d33b1c;
        }

        /* ĐÃ SỬA: Đảm bảo mặc định ẩn mục kết quả khi vừa tải trang */
        .result-box {
            margin-top: 20px;
            display: none;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px dashed #ee4d2d;
        }

        .btn-copy {
            background-color: #0084ff;
        }

        .btn-copy:hover {
            background-color: #0066cc;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Tạo Link Shopee</h1>

    <p>Dán link sản phẩm Shopee vào đây</p>

    <input
        type="text"
        id="shopeeLink"
        placeholder="Nhập link Shopee..."
    >

    <button id="btnSubmit" onclick="generateAffLink()">
        Tạo Link Ngay
    </button>

    <div class="result-box" id="resultBox">
        <p style="font-weight:bold; color:#333;">Lấy mã 25% FB:</p>
        <textarea id="outputLink" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">
            Copy link lấy mã
        </button>
    </div>

</div>

<script>
async function generateAffLink() {
    let inputLink = document.getElementById("shopeeLink").value.trim();
    const resultBox = document.getElementById("resultBox");
    const outputLink = document.getElementById("outputLink");
    const btnSubmit = document.getElementById("btnSubmit");

    // Affiliate IDs
    const idBuoc1 = "17307950127";
    const idBuoc2 = "17363570097";

    if (!inputLink) {
        alert("Vui lòng nhập link Shopee");
        return;
    }

    // tự thêm https
    if (!inputLink.startsWith("http://") && !inputLink.startsWith("https://")) {
        inputLink = "https://" + inputLink;
    }

    // ĐÃ SỬA: Giữ ẩn resultBox lúc đang tải, đổi chữ nút bấm để báo hiệu trạng thái xử lý
    resultBox.style.display = "none"; 
    btnSubmit.disabled = true;
    btnSubmit.innerText = "Đang xử lý dữ liệu...";

    try {
        // gọi Worker
        const response = await fetch(
            "https://shopee-resolve.onedayofu01.workers.dev",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    url: inputLink
                })
            }
        );

        const data = await response.json();

        if (!data.success) {
            throw new Error(data.error);
        }

        // link sạch
        const cleanLink = data.final;

        // tạo affiliate links
        const linkBuoc1 =
            "https://s.shopee.vn/an_redir?origin_link=" +
            encodeURIComponent(cleanLink) +
            "&affiliate_id=" +
            idBuoc1;
        const linkBuoc2 =
            "https://s.shopee.vn/an_redir?origin_link=" +
            encodeURIComponent(cleanLink) +
            "&affiliate_id=" +
            idBuoc2;

        // template bằng dấu nháy ngược chuẩn cú pháp GitHub Pages
        const finalTemplate = 
`Cách lấy mã 25% FB, đảm bảo làm đủ 2 bước nhé
Bước 1: Ấn vào link
${linkBuoc1}
Bước 2: Quay lại ấn vào link sau để mua với mã giảm giá
${linkBuoc2}`;

        // ĐÃ SỬA: Chỉ hiển thị resultBox sau khi dữ liệu đã sẵn sàng nhập vào ô text
        outputLink.value = finalTemplate;
        resultBox.style.display = "block";

    } catch (error) {
        console.log(error);
        alert("Không xử lý được liên kết này. Vui lòng thử lại!");
        resultBox.style.display = "none";
    } finally {
        // Khôi phục nút bấm về trạng thái ban đầu
        btnSubmit.disabled = false;
        btnSubmit.innerText = "Tạo Link Ngay";
    }
}

function copyToClipboard() {
    const copyText = document.getElementById("outputLink");
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert("Đã copy!");
}
</script>

</body>
</html>
