<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee Săn Sale</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px 20px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h1 { color: #ee4d2d; font-size: 24px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #ee4d2d; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #d33b1c; }
        .result-box { margin-top: 20px; display: none; background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px dashed #ee4d2d; }
        .btn-copy { background-color: #0084ff; margin-top: 5px; }
        .btn-copy:hover { background-color: #0066cc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tạo Link Shopee</h1>
    <p>Dán link sản phẩm Shopee vào đây để nhận mã giảm giá</p>
    
    <input type="text" id="shopeeLink" placeholder="Nhập liên kết sản phẩm Shopee...">
    <button onclick="generateAffLink()">Tạo Link Ngay</button>

    <div class="result-box" id="resultBox">
        <p style="font-weight: bold; color: #333;">Link Affiliate của bạn:</p>
        <input type="text" id="outputLink" readonly>
        <button class="btn-copy" onclick="copyToClipboard()">Copy Link</button>
    </div>
</div>

<script>
    function generateAffLink() {
        const inputLink = document.getElementById('shopeeLink').value.trim();
        const resultBox = document.getElementById('resultBox');
        const outputLink = document.getElementById('outputLink');
        
        // THAY MÃ APP ID CỦA BẠN VÀO ĐÂY (Ví dụ: 350685531728)
        const myAppId = "17363570097"; 

        if (inputLink === "") {
            alert("Vui lòng dán link Shopee vào!");
            return;
        }

        try {
            // Giải mã link nếu người dùng copy từ Facebook/TikTok bị dính ký tự lạ
            const decodedLink = decodeURIComponent(inputLink);
            
// Cấu trúc link chuyển hướng Shopee Affiliate mới theo yêu cầu của bạn
const myAffiliateId = "17363570097";
const affLink = `https://shopee.vn{encodeURIComponent(decodedLink)}&affiliate_id=${myAffiliateId}`;
            
            outputLink.value = affLink;
            resultBox.style.display = 'block';
        } catch (error) {
            alert("Link không đúng định dạng, vui lòng thử lại!");
        }
    }

    function copyToClipboard() {
        const copyText = document.getElementById("outputLink");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(copyText.value);
        alert("Đã copy link thành công!");
    }
</script>

</body>
</html>
