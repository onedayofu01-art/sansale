<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px 20px;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        h1 {
            color: #ee4d2d;
            font-size: 24px;
            margin-bottom: 20px;
        }

        input[type="text"] {

            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {

            width: 100%;
            padding: 12px;
            background-color: #ee4d2d;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #d33b1c;
        }

        .result-box {

            margin-top: 20px;
            display: none;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px dashed #ee4d2d;
        }

        .btn-copy {
            background-color: #0084ff;
        }

        .btn-copy:hover {
            background-color: #0066cc;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Tạo Link Shopee</h1>

    <p>
        Dán link sản phẩm Shopee cần mua vào đây
    </p>

    <input
        type="text"
        id="shopeeLink"
        placeholder="Nhập link Shopee..."
    >

    <button onclick="generateAffLink()">
        Tạo Link Ngay
    </button>

    <div
        class="result-box"
        id="resultBox"
    >

        <p
            style="
                font-weight:bold;
                color:#333;
            "
        >
            Link đã sẵn sàng để copy
        </p>

        <!-- Ẩn hoàn toàn dữ liệu -->
        <input
            type="hidden"
            id="outputLink"
        >

        <button
            class="btn-copy"
            onclick="copyToClipboard()"
        >
            Sao chép link lấy mã 25%
        </button>

        <a
            href="https://www.facebook.com/share/p/1HBc1Lj8on/"
            target="_blank"
            style="
                display:block;
                width:100%;
                padding:12px;
                background-color:#42b72a;
                color:white;
                text-decoration:none;
                border-radius:5px;
                font-weight:bold;
                margin-top:10px;
                box-sizing:border-box;
            "
        >
            Dán vào post này để lấy mã 25%
        </a>

        <div
            style="
                margin-top:20px;
                padding-top:15px;
                border-top:1px dashed #ccc;
            "
        >

            <div
                style="
                    font-weight:bold;
                    margin-bottom:10px;
                    color:#555;
                "
            >
                Link dự phòng
            </div>

            <button
                onclick="copyBackup1()"
                style="
                    background:#ff9800;
                "
            >
                Sao chép link lấy mã 22% (1)
            </button>

            <button
                onclick="copyBackup2()"
                style="
                    background:#ff9800;
                    margin-top:8px;
                "
            >
                Sao chép link lấy mã 22% (2)
            </button>

        </div>

    </div>

</div>

<script>

async function generateAffLink() {

    let inputLink =
        document
        .getElementById("shopeeLink")
        .value
        .trim();

    const resultBox =
        document.getElementById("resultBox");

    const outputLink =
        document.getElementById("outputLink");

    // Affiliate IDs
    const idBuoc1 = "17307950127";
    const idBuoc2 = "17363570097";

    // backup 22%
    const idBackup1 = "17395070485";
    const idBackup2 = "17353950011";

    if (!inputLink) {

        alert("Vui lòng nhập link Shopee");

        return;
    }

    // tự thêm https
    if (
        !inputLink.startsWith("http://") &&
        !inputLink.startsWith("https://")
    ) {

        inputLink = "https://" + inputLink;
    }

    resultBox.style.display = "block";

    outputLink.value =
        "Đang xử lý dữ liệu...";

    try {

        // gọi Worker
        const response = await fetch(
            "https://shopee-resolve.onedayofu01.workers.dev",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                    url: inputLink
                })
            }
        );

        const data =
            await response.json();

        if (!data.success) {

            throw new Error(data.error);
        }

        // link sạch
        const cleanLink =
            data.final;

        // tạo affiliate links
        const linkBuoc1 =
            "https://s.shopee.vn/an_redir?origin_link=" +
            encodeURIComponent(cleanLink) +
            "&affiliate_id=" +
            idBuoc1;

        const linkBuoc2 =
            "https://s.shopee.vn/an_redir?origin_link=" +
            encodeURIComponent(cleanLink) +
            "&affiliate_id=" +
            idBuoc2;

        // template chính
        const finalTemplate =
`Cách lấy mã 25% FB, đảm bảo làm đủ 2 bước nhé
Bước 1: Ấn vào link
${linkBuoc1}
Bước 2: Quay lại ấn vào link sau để mua với mã giảm giá
${linkBuoc2}`;

        outputLink.value =
            finalTemplate;

// backup 1
window.backupTemplate1 =
`Cách lấy mã 22%, đảm bảo làm đủ 2 bước nhé
Bước 1: Ấn vào link
https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanLink)}&affiliate_id=${idBackup1}
Bước 2: Quay lại ấn vào link sau để mua với mã giảm giá
https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanLink)}&affiliate_id=${idBuoc2}`;

// backup 2
window.backupTemplate2 =
`Cách lấy mã 22%, đảm bảo làm đủ 2 bước nhé
Bước 1: Ấn vào link
https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanLink)}&affiliate_id=${idBackup2}
Bước 2: Quay lại ấn vào link sau để mua với mã giảm giá
https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanLink)}&affiliate_id=${idBuoc2}`;

    } catch (error) {

        console.log(error);

        outputLink.value =
            "Không xử lý được link.";
    }
}

function copyToClipboard() {

    const copyText =
        document.getElementById(
            "outputLink"
        ).value;

    navigator.clipboard.writeText(
        copyText
    );

    alert("Đã copy!");
}

function copyBackup1() {

    navigator.clipboard.writeText(
        window.backupTemplate1 || "Chưa tạo link"
    );

    alert("Đã copy link dự phòng 1!");
}

function copyBackup2() {

    navigator.clipboard.writeText(
        window.backupTemplate2 || "Chưa tạo link"
    );

    alert("Đã copy link dự phòng 2!");
}

</script>

</body>
</html>
